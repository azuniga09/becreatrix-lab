<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeCreatrix Lab · Acceso</title>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  // ── CONFIGURA TU FIREBASE AQUÍ ──────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyCTCZ-izWG9qlDHyHQGN6Z2WDt5HhOb_KA",
    authDomain: "becreatrix-lab.firebaseapp.com",
    projectId: "becreatrix-lab",
    storageBucket: "becreatrix-lab.firebasestorage.app",
    messagingSenderId: "295011530860",
    appId: "1:295011530860:web:d81a6293910e2f994f4049"
  };
  // ────────────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window._auth = auth;
  window._db = db;
  window._fbReady = true;

  // Manejar resultado del redirect de Google
  getRedirectResult(auth).then(async (result) => {
    if (!result) return;
    const user = result.user;
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) {
      await setDoc(doc(db, 'users', user.uid), {
        nombre: user.displayName || '',
        email: user.email,
        foto: user.photoURL || '',
        rol: 'facilitador',
        creadoEn: Date.now()
      });
    }
  }).catch(e => console.error(e));

  // Si ya hay sesión activa, redirige según rol
  onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) return;
    const rol = snap.data().rol;
    if (rol === 'facilitador') window.location.href = 'dashboard.html';
    else if (rol === 'padre') window.location.href = 'parent.html';
  });

  // ── LOGIN ────────────────────────────────────────────────────────────────
  window.doLogin = async function() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const btn   = document.getElementById('btn-login');
    if (!email || !pass) { showErr('login', 'Completa email y contraseña.'); return; }
    btn.disabled = true; btn.textContent = 'Entrando...';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      // onAuthStateChanged redirige automáticamente
    } catch(e) {
      btn.disabled = false; btn.textContent = 'Entrar';
      showErr('login', friendlyError(e.code));
    }
  };

  // ── REGISTRO FACILITADOR ──────────────────────────────────────────────────
  window.doRegister = async function() {
    const nombre = document.getElementById('reg-nombre').value.trim();
    const email  = document.getElementById('reg-email').value.trim();
    const pass   = document.getElementById('reg-pass').value;
    const pass2  = document.getElementById('reg-pass2').value;
    if (!nombre || !email || !pass) { showErr('reg', 'Completa todos los campos.'); return; }
    if (pass !== pass2) { showErr('reg', 'Las contraseñas no coinciden.'); return; }
    if (pass.length < 6) { showErr('reg', 'La contraseña debe tener al menos 6 caracteres.'); return; }
    const btn = document.getElementById('btn-reg');
    btn.disabled = true; btn.textContent = 'Creando cuenta...';
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, 'users', cred.user.uid), {
        nombre, email, rol: 'facilitador', creadoEn: Date.now()
      });
      // onAuthStateChanged redirige automáticamente
    } catch(e) {
      btn.disabled = false; btn.textContent = 'Crear cuenta';
      showErr('reg', friendlyError(e.code));
    }
  };

  // ── RECUPERAR CONTRASEÑA ──────────────────────────────────────────────────
  window.doReset = async function() {
    const email = document.getElementById('reset-email').value.trim();
    if (!email) { showErr('reset', 'Escribe tu email.'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showErr('reset', '✅ Correo enviado. Revisa tu bandeja.', true);
    } catch(e) {
      showErr('reset', friendlyError(e.code));
    }
  };

  // ── GOOGLE LOGIN ─────────────────────────────────────────────────────────
  async function googleSignIn(btnId) {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    const btn = document.getElementById(btnId);
    if (btn) { btn.disabled = true; btn.textContent = 'Redirigiendo...'; }
    try {
      await signInWithRedirect(auth, provider);
    } catch(e) {
      if (btn) { btn.disabled = false; }
      showErr('login', friendlyError(e.code));
    }
  }

  window.doGoogle    = () => googleSignIn('btn-google');
  window.doGoogleReg = () => googleSignIn('btn-google-reg');

  function friendlyError(code) {
    const map = {
      'auth/user-not-found': 'No encontramos una cuenta con ese email.',
      'auth/wrong-password': 'Contraseña incorrecta.',
      'auth/invalid-credential': 'Email o contraseña incorrectos.',
      'auth/email-already-in-use': 'Ese email ya tiene una cuenta.',
      'auth/invalid-email': 'El email no es válido.',
      'auth/too-many-requests': 'Demasiados intentos. Espera unos minutos.',
      'auth/network-request-failed': 'Sin conexión. Revisa tu internet.',
    };
    return map[code] || 'Ocurrió un error. Intenta de nuevo.';
  }

  function showErr(scope, msg, isSuccess = false) {
    const el = document.getElementById('err-' + scope);
    el.textContent = msg;
    el.style.color = isSuccess ? '#1A8A4A' : '#C0392B';
    el.style.display = 'block';
  }
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple: #3C3489;
  --violet: #7F77DD;
  --light: #EEEDFE;
  --pale: #F5F4FF;
  --yellow: #FFD23F;
  --text: #1A1A2E;
  --mid: #555570;
  --muted: #888;
  --border: #E0DFEF;
  --white: #fff;
  --radius: 14px;
}
html, body { height: 100%; }
body {
  font-family: 'Segoe UI', system-ui, Arial, sans-serif;
  background: var(--pale);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 1.5rem 1rem;
}

/* ── LOGO ── */
.logo-wrap { text-align: center; margin-bottom: 2rem; }
.logo-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 64px; height: 64px; border-radius: 18px;
  background: var(--purple); margin-bottom: 10px;
  font-size: 32px; box-shadow: 0 4px 20px rgba(60,52,137,0.25);
}
.logo-name { font-size: 22px; font-weight: 800; color: var(--purple); letter-spacing: -0.5px; }
.logo-name span { color: var(--violet); }
.logo-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* ── CARD ── */
.card {
  background: var(--white); border-radius: var(--radius);
  box-shadow: 0 4px 32px rgba(60,52,137,0.10);
  padding: 2rem; width: 100%; max-width: 400px;
}

/* ── TABS ── */
.tabs { display: flex; gap: 0; margin-bottom: 1.75rem; border-bottom: 2px solid var(--border); }
.tab {
  flex: 1; padding: 10px 0; font-size: 14px; font-weight: 700;
  color: var(--muted); background: none; border: none; cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all 0.2s; font-family: inherit;
}
.tab.active { color: var(--violet); border-bottom-color: var(--violet); }

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── FORM ── */
.field { margin-bottom: 1rem; }
.field label {
  display: block; font-size: 12px; font-weight: 700;
  color: var(--mid); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em;
}
input[type=text], input[type=email], input[type=password] {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 15px; font-family: inherit; color: var(--text);
  background: var(--white); transition: border-color 0.2s;
}
input:focus { outline: none; border-color: var(--violet); }

/* ── BUTTON ── */
.btn-full {
  width: 100%; padding: 13px;
  background: var(--purple); color: white;
  border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: background 0.2s;
  margin-top: 0.5rem;
}
.btn-full:hover { background: var(--violet); }
.btn-full:disabled { background: #bbb; cursor: not-allowed; }

/* ── LINK BTN ── */
.link-btn {
  background: none; border: none; color: var(--violet);
  font-size: 13px; cursor: pointer; font-family: inherit;
  text-decoration: underline; padding: 0;
}

/* ── ERROR ── */
.err { font-size: 12px; color: #C0392B; margin-top: 8px; display: none; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 1.25rem 0; }

/* ── RESET PANEL ── */
.reset-wrap { display: none; }
.reset-wrap.open { display: block; }
.reset-back { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; font-family: inherit; margin-bottom: 1rem; display: flex; align-items: center; gap: 4px; }

/* ── FOOTER ── */
.footer { margin-top: 1.5rem; font-size: 12px; color: var(--muted); text-align: center; }
.footer strong { color: var(--purple); }

/* ── GOOGLE BUTTON ── */
.btn-google {
  width: 100%; padding: 11px 14px;
  background: var(--white); color: var(--text);
  border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-bottom: 0;
}
.btn-google:hover { border-color: var(--violet); background: var(--pale); }
.btn-google:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-google img { width: 18px; height: 18px; }

.or-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 1rem 0; color: var(--muted); font-size: 12px; font-weight: 600;
}
.or-divider::before, .or-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── LOADING OVERLAY ── */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(245,244,255,0.85);
  display: none; align-items: center; justify-content: center;
  z-index: 100; flex-direction: column; gap: 12px;
}
.loading-overlay.show { display: flex; }
.spinner { font-size: 40px; animation: spin 1.1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { font-size: 14px; color: var(--mid); font-weight: 600; }
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo-mark">🧱</div>
  <div class="logo-name">Be<span>Creatrix</span> Lab</div>
  <div class="logo-sub">Plataforma de Innovación Infantil</div>
</div>

<div class="card">

  <!-- LOGIN / REGISTRO tabs -->
  <div id="auth-wrap">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
      <button class="tab" id="tab-reg" onclick="switchTab('reg')">Crear cuenta</button>
    </div>

    <!-- LOGIN -->
    <div class="panel active" id="panel-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <p class="err" id="err-login"></p>
      <button class="btn-full" id="btn-login" onclick="doLogin()">Entrar →</button>
      <div style="text-align:center;margin-top:1rem;">
        <button class="link-btn" onclick="showReset()">Olvidé mi contraseña</button>
      </div>
      <div class="or-divider">o</div>
      <button class="btn-google" id="btn-google" onclick="doGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Continuar con Google
      </button>
    </div>

    <!-- REGISTRO -->
    <div class="panel" id="panel-reg">
      <div class="field">
        <label>Tu nombre</label>
        <input type="text" id="reg-nombre" placeholder="Nombre del facilitador..." autocomplete="name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="tu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Confirmar contraseña</label>
        <input type="password" id="reg-pass2" placeholder="Repite la contraseña" autocomplete="new-password"
          onkeydown="if(event.key==='Enter') doRegister()">
      </div>
      <p class="err" id="err-reg"></p>
      <button class="btn-full" id="btn-reg" onclick="doRegister()">Crear cuenta de facilitador</button>
      <div class="or-divider">o</div>
      <button class="btn-google" id="btn-google-reg" onclick="doGoogleReg()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Registrarme con Google
      </button>
    </div>
  </div>

  <!-- RECUPERAR CONTRASEÑA -->
  <div class="reset-wrap" id="reset-wrap">
    <button class="reset-back" onclick="hideReset()">← Volver</button>
    <div style="margin-bottom:1rem;">
      <div style="font-size:16px;font-weight:700;color:var(--purple);margin-bottom:4px;">Recuperar contraseña</div>
      <p style="font-size:13px;color:var(--mid);">Te enviaremos un correo para restablecer tu contraseña.</p>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="reset-email" placeholder="tu@email.com">
    </div>
    <p class="err" id="err-reset"></p>
    <button class="btn-full" onclick="doReset()">Enviar correo</button>
  </div>

</div>

<div class="footer">
  <strong>BeCreatrix León</strong> · Plataforma para facilitadores e instructores
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading-overlay">
  <span class="spinner">🧱</span>
  <p>Verificando acceso...</p>
</div>

<script>
function switchTab(tab) {
  ['login','reg'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
  });
  document.getElementById('err-login').style.display = 'none';
  document.getElementById('err-reg').style.display = 'none';
}

function showReset() {
  document.getElementById('auth-wrap').style.display = 'none';
  document.getElementById('reset-wrap').classList.add('open');
}

function hideReset() {
  document.getElementById('auth-wrap').style.display = 'block';
  document.getElementById('reset-wrap').classList.remove('open');
  document.getElementById('err-reset').style.display = 'none';
}

// Show loading while Firebase checks auth state
document.addEventListener('DOMContentLoaded', () => {
  // Brief loading state on page load
  setTimeout(() => {
    if (!window._fbReady) {
      document.getElementById('loading-overlay').classList.remove('show');
    }
  }, 1500);
});
</script>
</body>
</html>
